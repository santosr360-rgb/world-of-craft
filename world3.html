<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World of Craft — Vexmor's Labyrinth</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0010; }
    canvas { display: block; }

    #back-btn {
      position: fixed; top: 14px; left: 14px;
      padding: 8px 18px;
      background: rgba(0,0,0,0.55); color: #bb66ff;
      border: 1px solid #9c27b0;
      font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 2px;
      cursor: pointer; text-decoration: none; pointer-events: all;
      transition: background 0.2s; z-index: 200;
    }
    #back-btn:hover { background: rgba(156,39,176,0.15); }

    #game-title {
      position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
      font-family: 'Cinzel', serif; font-size: 1.1rem; letter-spacing: 4px;
      color: #d4a0ff; text-shadow: 0 2px 8px rgba(156,39,176,0.8); pointer-events: none; z-index: 200;
    }

    /* Dragon HP */
    #dragon-hud {
      position: fixed; top: 55px; left: 50%; transform: translateX(-50%);
      text-align: center; pointer-events: none; z-index: 200;
    }
    #dragon-label {
      font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 3px;
      color: #bb44ff; text-shadow: 0 0 10px #9900cc; margin-bottom: 4px;
    }
    #hp-bar {
      width: 220px; height: 14px;
      background: #0a0018; border: 2px solid #440066; border-radius: 2px;
    }
    #hp-fill {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #7700aa, #cc44ff);
      transition: width 0.25s ease;
    }

    /* Player HP */
    #player-hud {
      position: fixed; bottom: 20px; right: 20px;
      text-align: right; pointer-events: none; z-index: 200;
    }
    #player-label {
      font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 2px;
      color: #66cc66; margin-bottom: 3px;
    }
    #player-hp-bar {
      width: 160px; height: 10px;
      background: #0a180a; border: 1px solid #336633; border-radius: 2px;
    }
    #player-hp-fill {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #44aa44, #66ff66);
      transition: width 0.25s ease;
    }

    /* Sword HUD */
    #sword-hud {
      display: none;
      position: fixed; bottom: 50px; left: 20px;
      font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 2px;
      color: #bb88ff; text-shadow: 0 0 10px #9900cc;
      pointer-events: none; z-index: 200;
      background: rgba(0,0,0,0.45); padding: 6px 14px; border: 1px solid #660099;
    }

    /* Pickup hint */
    #pickup-hint {
      display: none;
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 2px;
      color: #fff; text-shadow: 0 0 8px #9900cc;
      background: rgba(0,0,0,0.5); padding: 6px 16px; border: 1px solid #660099;
      pointer-events: none; z-index: 200;
    }

    /* Victory */
    #victory-msg {
      display: none;
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-family: 'Cinzel', serif; font-size: clamp(1.5rem, 5vw, 3rem);
      letter-spacing: 4px; color: #cc66ff;
      text-shadow: 0 0 30px #9900cc, 0 0 60px #6600aa;
      text-align: center; pointer-events: none; z-index: 300;
      animation: victoryPulse 1s ease-in-out infinite alternate;
    }
    @keyframes victoryPulse {
      from { filter: brightness(1); }
      to   { filter: brightness(1.4); }
    }
    #victory-msg .sub {
      display: block; font-size: 0.5em; margin-top: 10px;
      color: #aa77dd; letter-spacing: 3px;
    }

    /* Death screen */
    #death-msg {
      display: none;
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-family: 'Cinzel', serif; font-size: clamp(1.5rem, 5vw, 3rem);
      letter-spacing: 4px; color: #ff3344;
      text-shadow: 0 0 30px #cc0000, 0 0 60px #880000;
      text-align: center; z-index: 300;
      animation: victoryPulse 1s ease-in-out infinite alternate;
    }
    #death-msg .sub {
      display: block; font-size: 0.45em; margin-top: 14px;
      color: #aa6666; letter-spacing: 3px;
      cursor: pointer; pointer-events: all;
      border: 1px solid #884444; padding: 8px 20px;
      transition: color 0.2s, border-color 0.2s;
    }
    #death-msg .sub:hover { color: #ff6666; border-color: #ff6666; }

    /* Hit flash overlay */
    #hit-flash {
      position: fixed; inset: 0; pointer-events: none; z-index: 250;
      background: rgba(150,0,255,0); transition: background 0.05s;
    }

    #controls-hint {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 2px;
      color: rgba(200,180,255,0.8); text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      white-space: nowrap; pointer-events: none; z-index: 200;
    }

    /* Shadow vignette */
    #vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 150;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.35) 100%);
    }
  </style>
</head>
<body>

  <a href="index.html" id="back-btn">← BACK</a>
  <div id="game-title">VEXMOR'S LABYRINTH</div>

  <div id="dragon-hud">
    <div id="dragon-label">👁 VEXMOR — SHADOW WRAITH</div>
    <div id="hp-bar"><div id="hp-fill"></div></div>
  </div>

  <div id="player-hud">
    <div id="player-label">GEORGE HP</div>
    <div id="player-hp-bar"><div id="player-hp-fill"></div></div>
  </div>

  <div id="sword-hud">⚔ SHADOW BLADE EQUIPPED</div>
  <div id="pickup-hint">⚔ Walk closer to pick up the Shadow Blade!</div>
  <div id="victory-msg">VEXMOR DEFEATED!<span class="sub">The Shadow Labyrinth is purified.</span></div>
  <div id="death-msg">YOU HAVE FALLEN<span class="sub" onclick="location.reload()">↻ TRY AGAIN</span></div>
  <div id="hit-flash"></div>
  <div id="vignette"></div>
  <div id="controls-hint">↑↓ Move &nbsp;·&nbsp; ←→ Turn &nbsp;·&nbsp; SPACE Jump &nbsp;·&nbsp; F Attack</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>'use strict';

// ═══════════════════════════════════════════════════════════
//  RENDERER + SCENE + CAMERA
// ═══════════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const SKY = 0x1a1030;
scene.background = new THREE.Color(SKY);
scene.fog = new THREE.FogExp2(0x1a1030, 0.006);

const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.1, 500);
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ═══════════════════════════════════════════════════════════
//  LIGHTING — dark cavern with purple glow
// ═══════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x6644aa, 1.2));

// Overhead light (cracks in the cavern ceiling)
const caveLight = new THREE.DirectionalLight(0xaa77ee, 1.4);
caveLight.position.set(30, 80, 20);
caveLight.castShadow = true;
Object.assign(caveLight.shadow.camera, { left:-130, right:130, top:130, bottom:-130, far:350 });
caveLight.shadow.mapSize.set(2048, 2048);
scene.add(caveLight);

// Purple point lights for atmosphere
const purpleLight1 = new THREE.PointLight(0xbb55ff, 3.0, 100);
purpleLight1.position.set(0, 12, 0);
scene.add(purpleLight1);

const purpleLight2 = new THREE.PointLight(0x9944ee, 2.5, 90);
purpleLight2.position.set(36, 10, 18);
scene.add(purpleLight2);

const purpleLight3 = new THREE.PointLight(0xaa55ff, 2.5, 80);
purpleLight3.position.set(-30, 9, -20);
scene.add(purpleLight3);

const purpleLight4 = new THREE.PointLight(0x9944dd, 2.0, 80);
purpleLight4.position.set(-10, 10, 30);
scene.add(purpleLight4);

const purpleLight5 = new THREE.PointLight(0x8844cc, 2.0, 80);
purpleLight5.position.set(20, 10, -30);
scene.add(purpleLight5);

const purpleLight6 = new THREE.PointLight(0xaa55ff, 2.0, 80);
purpleLight6.position.set(-40, 10, 10);
scene.add(purpleLight6);

// ═══════════════════════════════════════════════════════════
//  TERRAIN — dark stone cavern floor
// ═══════════════════════════════════════════════════════════
function getTerrainHeight(x, z) {
  const hill = 8 * Math.exp(-(x*x + z*z) / (22*22));
  const roll = 0.4 * Math.sin(x * 0.09) * Math.cos(z * 0.11);
  const jagged = 0.6 * Math.sin(x * 0.23) * Math.sin(z * 0.19);
  return hill + roll + jagged;
}

function getTerrainNormal(x, z) {
  const d = 0.5;
  const hL = getTerrainHeight(x - d, z), hR = getTerrainHeight(x + d, z);
  const hF = getTerrainHeight(x, z - d), hB = getTerrainHeight(x, z + d);
  return new THREE.Vector3(hL - hR, 2 * d, hF - hB).normalize();
}

const tGeo = new THREE.PlaneGeometry(240, 240, 100, 100);
tGeo.rotateX(-Math.PI / 2);
const tPos = tGeo.attributes.position;
for (let i = 0; i < tPos.count; i++) {
  tPos.setY(i, getTerrainHeight(tPos.getX(i), tPos.getZ(i)));
}
tGeo.computeVertexNormals();
const terrain = new THREE.Mesh(tGeo, new THREE.MeshLambertMaterial({ color: 0x3a3058, emissive: 0x110822, emissiveIntensity: 0.3 }));
terrain.receiveShadow = true;
scene.add(terrain);

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function mkBox(w, h, d, color, px, py, pz) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color, emissive: 0x220044, emissiveIntensity: 0.25 })
  );
  if (px !== undefined) m.position.set(px, py, pz);
  m.castShadow = true; m.receiveShadow = true;
  return m;
}

function mkGlowBox(w, h, d, color, emissive, px, py, pz) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color, emissive, emissiveIntensity: 0.9 })
  );
  if (px !== undefined) m.position.set(px, py, pz);
  m.castShadow = true; m.receiveShadow = true;
  return m;
}

const _worldUp   = new THREE.Vector3(0, 1, 0);
const _slopeQ    = new THREE.Quaternion();
const _faceQ     = new THREE.Quaternion();
const _yAxis     = new THREE.Vector3(0, 1, 0);
const _eu        = new THREE.Euler();
const _fwd       = new THREE.Vector3();
const _cOff      = new THREE.Vector3();
const _cTgt      = new THREE.Vector3();
const _toDragon  = new THREE.Vector3();
const _gFwd      = new THREE.Vector3();

// ═══════════════════════════════════════════════════════════
//  GEORGE
// ═══════════════════════════════════════════════════════════
const SKIN = 0xf5c98c, SHIRT = 0x2244cc, PANTS = 0x1a2a44, HAIR_C = 0x3a2010;
const georgeRoot = new THREE.Group();
scene.add(georgeRoot);

georgeRoot.add(mkBox(0.78, 1.05, 0.42, SHIRT, 0, 1.275, 0));

const headPivot = new THREE.Group();
headPivot.position.set(0, 1.8, 0);
headPivot.add(
  mkBox(0.65, 0.65, 0.65, SKIN,    0,    0.325, 0),
  mkBox(0.68, 0.22, 0.68, HAIR_C,  0,    0.76,  0),
  mkBox(0.13, 0.11, 0.06, 0x1a1a55, -0.15, 0.31, -0.335),
  mkBox(0.13, 0.11, 0.06, 0x1a1a55,  0.15, 0.31, -0.335)
);
georgeRoot.add(headPivot);

const legLP = new THREE.Group(); legLP.position.set(-0.19, 0.75, 0);
legLP.add(mkBox(0.29, 0.75, 0.29, PANTS, 0, -0.375, 0)); georgeRoot.add(legLP);

const legRP = new THREE.Group(); legRP.position.set(0.19, 0.75, 0);
legRP.add(mkBox(0.29, 0.75, 0.29, PANTS, 0, -0.375, 0)); georgeRoot.add(legRP);

const armLP = new THREE.Group(); armLP.position.set(-0.51, 1.73, 0);
armLP.add(mkBox(0.26, 0.85, 0.26, SHIRT, 0, -0.425, 0)); georgeRoot.add(armLP);

const armRP = new THREE.Group(); armRP.position.set(0.51, 1.73, 0);
armRP.add(mkBox(0.26, 0.85, 0.26, SHIRT, 0, -0.425, 0)); georgeRoot.add(armRP);

// Player glow light (follows George)
const playerGlow = new THREE.PointLight(0x8855cc, 2.0, 25);
playerGlow.position.set(0, 3, 0);
georgeRoot.add(playerGlow);

// ── Player state ──
const BOUNDARY = 100;
const ps = {
  pos: new THREE.Vector3(0, getTerrainHeight(0, 0), 0),
  velY: 0, angle: 0, onGround: true, walkCycle: 0, moving: false,
  hp: 5, maxHp: 5, alive: true, invincible: 0
};
const MOVE_SPEED = 5.5, ROTATE_SPEED = 2.2, JUMP_VEL = 9.5, GRAVITY = 24;

// ═══════════════════════════════════════════════════════════
//  CAVERN PILLARS (dark stone columns)
// ═══════════════════════════════════════════════════════════
function placePillar(x, z) {
  const y = getTerrainHeight(x, z);
  const h = 8 + Math.random() * 6;
  scene.add(mkGlowBox(1.8, h, 1.8, 0x2a1840, 0x1a0830, x, y + h/2, z));
  scene.add(mkGlowBox(2.4, 0.6, 2.4, 0x3a2450, 0x1a0830, x, y + h, z));
  scene.add(mkGlowBox(2.4, 0.6, 2.4, 0x3a2450, 0x1a0830, x, y + 0.3, z));
  // Purple crystal on top — always, with a light
  const crystal = mkGlowBox(0.5, 1.2, 0.5, 0xbb44ff, 0x9922dd, x, y + h + 0.9, z);
  crystal.rotation.y = Math.random() * Math.PI;
  crystal.rotation.z = 0.15;
  scene.add(crystal);
  const pl = new THREE.PointLight(0x9933ff, 1.0, 20);
  pl.position.set(x, y + h + 1.5, z);
  scene.add(pl);
}

[[-20,16],[18,-22],[-28,-8],[30,10],[-14,30],[22,28],
 [-36,-18],[40,-10],[-10,-34],[34,-28],[-40,12],[14,38],
 [-30,34],[44,24],[-44,-4],[8,-40]
].forEach(([x,z]) => placePillar(x,z));

// ═══════════════════════════════════════════════════════════
//  GLOWING CRYSTALS (scattered on ground)
// ═══════════════════════════════════════════════════════════
const crystals = [];
function placeCrystal(x, z, color, emissive) {
  const y = getTerrainHeight(x, z);
  const h = 0.8 + Math.random() * 1.5;
  const crystal = mkGlowBox(0.35, h, 0.35, color, emissive, x, y + h/2, z);
  crystal.rotation.y = Math.random() * Math.PI;
  crystal.rotation.z = (Math.random() - 0.5) * 0.3;
  scene.add(crystal);
  crystals.push(crystal);
  // All crystals emit light
  const cl = new THREE.PointLight(emissive, 0.8, 18);
  cl.position.set(x, y + h, z);
  scene.add(cl);
}

[[5,8],[-12,5],[8,-14],[-6,-18],[15,14],[-18,10],[22,-8],
 [-24,-16],[10,24],[-8,26],[28,4],[-32,6],[16,-30],[-16,-28],
 [32,-20],[-38,18],[6,-36],[38,14],[-26,28],[20,-34],
 [0,16],[-10,-10],[12,6],[-4,20],[26,20]
].forEach(([x,z]) => {
  const colors = [
    [0x9900ff, 0x6600aa],
    [0xcc44ff, 0x9900cc],
    [0x6633cc, 0x4400aa],
    [0xff44cc, 0xaa0088]
  ];
  const c = colors[Math.floor(Math.random() * colors.length)];
  placeCrystal(x, z, c[0], c[1]);
});

// ═══════════════════════════════════════════════════════════
//  SHADOW WISPS (floating dark particles)
// ═══════════════════════════════════════════════════════════
const wisps = [];
for (let i = 0; i < 30; i++) {
  const s = 0.15 + Math.random() * 0.25;
  const wisp = new THREE.Mesh(
    new THREE.BoxGeometry(s, s, s),
    new THREE.MeshLambertMaterial({ color: 0xaa44ff, emissive: 0x7722cc, emissiveIntensity: 1.2, transparent: true, opacity: 0.7 })
  );
  const wx = (Math.random() - 0.5) * 160;
  const wz = (Math.random() - 0.5) * 160;
  const wy = getTerrainHeight(wx, wz) + 1 + Math.random() * 5;
  wisp.position.set(wx, wy, wz);
  scene.add(wisp);
  wisps.push({
    mesh: wisp,
    baseY: wy,
    speed: 0.5 + Math.random() * 1.5,
    phase: Math.random() * Math.PI * 2,
    driftX: (Math.random() - 0.5) * 0.3,
    driftZ: (Math.random() - 0.5) * 0.3
  });
}

// ═══════════════════════════════════════════════════════════
//  STALACTITES (hanging from ceiling)
// ═══════════════════════════════════════════════════════════
const CEILING_Y = 28;
function placeStalactite(x, z) {
  const h = 3 + Math.random() * 5;
  scene.add(mkGlowBox(0.8, h, 0.8, 0x2a2040, 0x1a0830, x, CEILING_Y - h/2, z));
  scene.add(mkGlowBox(0.4, 1.5, 0.4, 0x3a2850, 0x220a3a, x, CEILING_Y - h - 0.7, z));
}

// Cavern ceiling
const ceilGeo = new THREE.PlaneGeometry(240, 240);
ceilGeo.rotateX(Math.PI / 2);
const ceiling = new THREE.Mesh(ceilGeo, new THREE.MeshLambertMaterial({ color: 0x1a1428, emissive: 0x0a0414, emissiveIntensity: 0.3, side: THREE.DoubleSide }));
ceiling.position.y = CEILING_Y;
scene.add(ceiling);

[[10,5],[-15,-10],[25,15],[-5,25],[30,-15],[-25,5],[5,-30],
 [-35,-20],[40,5],[-10,35],[18,-25],[-30,30],[35,30],[-40,-10],
 [0,-18],[20,35],[-22,-30],[38,-25],[-8,8],[15,-8]
].forEach(([x,z]) => placeStalactite(x,z));

// ═══════════════════════════════════════════════════════════
//  SHADOW BATS
// ═══════════════════════════════════════════════════════════
const bats = [];
function createBat(bx, bz) {
  const root = new THREE.Group();
  // Body
  root.add(mkGlowBox(0.3, 0.25, 0.4, 0x3a2050, 0x220044, 0, 0, 0));
  // Wings
  const wingL = new THREE.Group(); wingL.position.set(-0.15, 0.05, 0);
  wingL.add(mkGlowBox(0.6, 0.06, 0.35, 0x441166, 0x330055, -0.3, 0, 0));
  root.add(wingL);
  const wingR = new THREE.Group(); wingR.position.set(0.15, 0.05, 0);
  wingR.add(mkGlowBox(0.6, 0.06, 0.35, 0x441166, 0x330055, 0.3, 0, 0));
  root.add(wingR);
  // Eyes
  root.add(mkGlowBox(0.06, 0.06, 0.04, 0xff0044, 0xff0044, -0.08, 0.06, -0.2));
  root.add(mkGlowBox(0.06, 0.06, 0.04, 0xff0044, 0xff0044, 0.08, 0.06, -0.2));

  const by = 14 + Math.random() * 10;
  root.position.set(bx, by, bz);
  scene.add(root);
  return {
    mesh: root, wingL, wingR,
    pos: new THREE.Vector3(bx, by, bz),
    angle: Math.random() * Math.PI * 2,
    speed: 3 + Math.random() * 4,
    flapPhase: Math.random() * Math.PI * 2,
    circleRadius: 5 + Math.random() * 10,
    centerX: bx, centerZ: bz
  };
}

[[0,0],[20,10],[-15,20],[10,-25],[-30,-5],[25,-18],[-20,30],[35,15]
].forEach(([x,z]) => bats.push(createBat(x,z)));

// ═══════════════════════════════════════════════════════════
//  SHADOW BLADE (sword for this world)
// ═══════════════════════════════════════════════════════════
const SWORD_POS = new THREE.Vector3(8, 0, -12);
SWORD_POS.y = getTerrainHeight(SWORD_POS.x, SWORD_POS.z) + 0.6;

const groundSword = new THREE.Group();
groundSword.add(mkGlowBox(0.08, 1.2, 0.08, 0x8800cc, 0x6600aa, 0, 0, 0));
groundSword.add(mkGlowBox(0.55, 0.08, 0.08, 0x9933cc, 0x6600aa, 0, -0.52, 0));
groundSword.add(mkBox(0.09, 0.38, 0.09, 0x2a1a3e, 0, -0.8, 0));
groundSword.add(mkGlowBox(0.16, 0.14, 0.16, 0xaa44ff, 0x7700cc, 0, -1.02, 0));
// Glow ring
const glowRing = mkGlowBox(0.6, 0.6, 0.6, 0x9900ff, 0x6600aa, 0, 0, 0);
glowRing.material.transparent = true; glowRing.material.opacity = 0.22;
groundSword.add(glowRing);

groundSword.position.copy(SWORD_POS);
groundSword.rotation.z = Math.PI / 2;
scene.add(groundSword);

// Hand sword
const handSword = new THREE.Group();
handSword.add(mkGlowBox(0.07, 1.0, 0.07, 0x8800cc, 0x6600aa, 0, -0.62, 0));
handSword.add(mkGlowBox(0.5, 0.07, 0.07, 0x9933cc, 0x6600aa, 0, -0.15, 0));
handSword.add(mkBox(0.08, 0.3, 0.08, 0x2a1a3e, 0, 0.08, 0));
handSword.position.set(0.05, -0.9, -0.1);
handSword.rotation.x = -0.2;

// ═══════════════════════════════════════════════════════════
//  VEXMOR — SHADOW WRAITH
// ═══════════════════════════════════════════════════════════
const DRAG_X = 38, DRAG_Z = 20;
const DRAG_BASE_Y = getTerrainHeight(DRAG_X, DRAG_Z) + 5;

function buildDragon() {
  const root = new THREE.Group();

  // ── Body (glowing dark purple) ──
  root.add(mkGlowBox(3.2, 2.0, 5.0, 0x2a1040, 0x1a0830, 0, 1.0, 0));
  root.add(mkGlowBox(3.5, 0.4, 5.2, 0x3a1860, 0x220044, 0, 0.05, 0)); // underbelly

  // ── Neck (elongated, serpentine) ──
  root.add(mkGlowBox(1.2, 1.8, 1.4, 0x2a1040, 0x1a0830, 0, 2.5, -2.6));
  root.add(mkGlowBox(1.0, 1.4, 1.0, 0x281038, 0x180828, 0, 3.6, -3.4));

  // ── Head (angular, menacing) ──
  root.add(mkGlowBox(2.0, 1.5, 2.6, 0x321248, 0x1e0a30, 0, 4.2, -4.6));
  // Snout (sharp)
  root.add(mkGlowBox(1.1, 0.6, 1.8, 0x381450, 0x200c34, 0, 3.8, -6.0));
  // Jaw glow
  root.add(mkGlowBox(0.9, 0.15, 1.4, 0x9933ff, 0x6600cc, 0, 3.55, -5.8));

  // Horns (curved shadow horns — glowing)
  root.add(mkGlowBox(0.22, 1.8, 0.22, 0x4a1878, 0x330066, -0.6, 5.6, -4.4));
  root.add(mkGlowBox(0.18, 0.8, 0.22, 0x4a1878, 0x330066, -0.65, 6.5, -4.8));
  root.add(mkGlowBox(0.22, 1.8, 0.22, 0x4a1878, 0x330066, 0.6, 5.6, -4.4));
  root.add(mkGlowBox(0.18, 0.8, 0.22, 0x4a1878, 0x330066, 0.65, 6.5, -4.8));

  // Dragon body glow light
  const dragonGlow = new THREE.PointLight(0x9933ff, 3.0, 30);
  dragonGlow.position.set(0, 3, -2);
  root.add(dragonGlow);

  // Eyes (piercing violet glow)
  const eyeMatL = new THREE.MeshLambertMaterial({ color: 0xee66ff, emissive: 0xcc33ff, emissiveIntensity: 2.0 });
  const eyeMatR = eyeMatL.clone();
  const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.28, 0.18), eyeMatL);
  eyeL.position.set(-0.55, 4.3, -5.9); eyeL.castShadow = true; root.add(eyeL);
  const eyeR = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.28, 0.18), eyeMatR);
  eyeR.position.set(0.55, 4.3, -5.9); eyeR.castShadow = true; root.add(eyeR);

  // ── Tail (long, whip-like — glowing) ──
  root.add(mkGlowBox(1.8, 1.4, 2.2, 0x2a1040, 0x1a0830, 0, 0.8, 2.8));
  root.add(mkGlowBox(1.2, 1.0, 2.6, 0x241038, 0x180828, 0, 0.5, 5.2));
  root.add(mkGlowBox(0.7, 0.6, 2.4, 0x1e0c30, 0x140820, 0, 0.3, 7.8));
  root.add(mkGlowBox(0.4, 0.4, 2.0, 0x180828, 0x100618, 0, 0.2, 10.0));
  root.add(mkGlowBox(0.25, 0.25, 0.8, 0x9933ff, 0x6600cc, 0, 0.15, 11.5));
  // Tail tip light
  const tailGlow = new THREE.PointLight(0x7722cc, 1.5, 15);
  tailGlow.position.set(0, 0.5, 11.5);
  root.add(tailGlow);

  // ── Wings (tattered, shadow-membrane — glowing veins) ──
  const wingLP = new THREE.Group(); wingLP.position.set(-1.6, 2.0, 0.5);
  wingLP.add(mkGlowBox(3.8, 0.12, 2.8, 0x241038, 0x1a0830, -1.9, 0, 0));
  wingLP.add(mkGlowBox(2.8, 0.1, 2.4, 0x1e0c30, 0x140820, -5.3, 0.1, 0.3));
  wingLP.add(mkGlowBox(1.4, 0.08, 1.6, 0x180a28, 0x100618, -7.5, 0.2, 0.5));
  wingLP.add(mkGlowBox(0.12, 0.14, 2.6, 0x7733bb, 0x5522aa, -1.0, 0.1, 0));
  wingLP.add(mkGlowBox(0.1, 0.12, 2.2, 0x7733bb, 0x5522aa, -3.5, 0.12, 0.2));
  root.add(wingLP);

  const wingRP = new THREE.Group(); wingRP.position.set(1.6, 2.0, 0.5);
  wingRP.add(mkGlowBox(3.8, 0.12, 2.8, 0x241038, 0x1a0830, 1.9, 0, 0));
  wingRP.add(mkGlowBox(2.8, 0.1, 2.4, 0x1e0c30, 0x140820, 5.3, 0.1, 0.3));
  wingRP.add(mkGlowBox(1.4, 0.08, 1.6, 0x180a28, 0x100618, 7.5, 0.2, 0.5));
  wingRP.add(mkGlowBox(0.12, 0.14, 2.6, 0x7733bb, 0x5522aa, 1.0, 0.1, 0));
  wingRP.add(mkGlowBox(0.1, 0.12, 2.2, 0x7733bb, 0x5522aa, 3.5, 0.12, 0.2));
  root.add(wingRP);

  // ── Legs (4 shadow-clawed legs — glowing) ──
  function mkLeg(lx, lz) {
    root.add(mkGlowBox(0.6, 1.2, 0.6, 0x241038, 0x180828, lx, 0.25, lz));
    root.add(mkGlowBox(0.45, 1.2, 0.45, 0x1e0c30, 0x140820, lx*0.8, -1.05, lz+lx*0.05));
    root.add(mkGlowBox(0.6, 0.2, 0.9, 0x180a28, 0x100618, lx*0.8, -1.7, lz-0.3));
    root.add(mkGlowBox(0.15, 0.1, 0.3, 0x9933ff, 0x6600cc, lx*0.8-0.15, -1.8, lz-0.7));
    root.add(mkGlowBox(0.15, 0.1, 0.3, 0x9933ff, 0x6600cc, lx*0.8+0.15, -1.8, lz-0.7));
  }
  mkLeg(-1.5, -2.0); mkLeg(1.5, -2.0);
  mkLeg(-1.5, 2.0);  mkLeg(1.5, 2.0);

  // Shadow aura (semi-transparent dark sphere)
  const auraMat = new THREE.MeshLambertMaterial({ color: 0x4400aa, emissive: 0x330088, emissiveIntensity: 0.5, transparent: true, opacity: 0.2 });
  const aura = new THREE.Mesh(new THREE.BoxGeometry(12, 8, 14), auraMat);
  aura.position.set(0, 2, 1);
  root.add(aura);

  root.position.set(DRAG_X, DRAG_BASE_Y, DRAG_Z);
  scene.add(root);
  return { root, wingLP, wingRP, eyeMatL, eyeMatR, aura };
}

const dragonParts = buildDragon();

// ═══════════════════════════════════════════════════════════
function spawnShadowBolt() {
  const bolt = mkGlowBox(0.5, 0.5, 0.5, 0x7700cc, 0x5500aa, 0, 0, 0);
  bolt.material.transparent = true;
  bolt.material.opacity = 0.8;
  bolt.position.copy(dragon.pos);
  bolt.position.y += 3;

  const dir = new THREE.Vector3();
  dir.subVectors(ps.pos, bolt.position);
  dir.y += 1; // aim slightly above
  dir.normalize();

  scene.add(bolt);
  dragon.shadowBolts.push({
    mesh: bolt,
    vel: dir.multiplyScalar(18),
    age: 0
  });
}

//  EXPLOSION
// ═══════════════════════════════════════════════════════════
function spawnExplosion() {
  const colors = [0x9900ff, 0x6600cc, 0xcc44ff, 0x330066, 0xffffff, 0x440088];
  for (let i = 0; i < 28; i++) {
    const s = 0.3 + Math.random() * 0.9;
    const p = mkBox(s, s, s, colors[Math.floor(Math.random()*colors.length)]);
    p.position.copy(dragon.pos).add(new THREE.Vector3(
      (Math.random()-0.5)*4, Math.random()*3, (Math.random()-0.5)*4
    ));
    const vel = new THREE.Vector3(
      (Math.random()-0.5)*16, 5+Math.random()*12, (Math.random()-0.5)*16
    );
    scene.add(p);
    dragon.explodeParticles.push({ mesh:p, vel, age:0 });
  }
}

function damagePlayer() {
  if (ps.invincible > 0 || !ps.alive) return;
  ps.hp--;
  ps.invincible = 1.0; // invincibility frames
  flashPlayerHit();
  updatePlayerHpBar();
  if (ps.hp <= 0) {
    ps.alive = false;
    deathMsgEl.style.display = 'block';
  }
}

// ═══════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════
let prevTime = performance.now();
let groundSwordSpinTime = 0;

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt  = Math.min((now - prevTime) / 1000, 0.05);
  prevTime  = now;
  groundSwordSpinTime += dt;

  if (ps.invincible > 0) {
    ps.invincible -= dt;
    // Blink George
    georgeRoot.visible = Math.floor(ps.invincible * 10) % 2 === 0;
  } else {
    georgeRoot.visible = true;
  }

  // ────────────────────────────────────────────────────────
  //  GEORGE — rotation & movement
  // ────────────────────────────────────────────────────────
  if (ps.alive) {
    if (keys['ArrowLeft']  || keys['KeyA']) ps.angle += ROTATE_SPEED * dt;
    if (keys['ArrowRight'] || keys['KeyD']) ps.angle -= ROTATE_SPEED * dt;

    const mz = (keys['ArrowUp']   || keys['KeyW'] ? -1 : 0)
              + (keys['ArrowDown'] || keys['KeyS'] ?  1 : 0);
    ps.moving = mz !== 0;
    if (ps.moving) {
      _eu.set(0, ps.angle, 0);
      _fwd.set(0, 0, mz).applyEuler(_eu).normalize();
      ps.pos.x += _fwd.x * MOVE_SPEED * dt;
      ps.pos.z += _fwd.z * MOVE_SPEED * dt;
      ps.pos.x = Math.max(-BOUNDARY, Math.min(BOUNDARY, ps.pos.x));
      ps.pos.z = Math.max(-BOUNDARY, Math.min(BOUNDARY, ps.pos.z));
    }

    if ((keys['Space'] || keys['KeyE']) && ps.onGround) {
      ps.velY = JUMP_VEL; ps.onGround = false;
    }
  } else {
    ps.moving = false;
  }

  const groundY = getTerrainHeight(ps.pos.x, ps.pos.z);
  if (ps.onGround) {
    ps.pos.y = groundY; ps.velY = 0;
  } else {
    ps.velY -= GRAVITY * dt;
    ps.pos.y += ps.velY * dt;
    if (ps.pos.y <= groundY) {
      ps.pos.y = groundY; ps.velY = 0; ps.onGround = true;
    }
  }

  georgeRoot.position.copy(ps.pos);
  if (ps.onGround) {
    const tn = getTerrainNormal(ps.pos.x, ps.pos.z);
    _slopeQ.setFromUnitVectors(_worldUp, tn);
    _faceQ.setFromAxisAngle(_yAxis, ps.angle);
    georgeRoot.quaternion.multiplyQuaternions(_slopeQ, _faceQ);
  } else {
    georgeRoot.rotation.set(0, ps.angle, 0);
  }

  if (ps.moving) ps.walkCycle += dt * 7;
  const sw = Math.sin(ps.walkCycle);
  legLP.rotation.x =  sw * 0.55;
  legRP.rotation.x = -sw * 0.55;
  headPivot.rotation.x = ps.moving ? Math.sin(ps.walkCycle * 2) * 0.04 : 0;

  if (!swing.active) {
    armLP.rotation.x = -sw * 0.45;
    armRP.rotation.x =  sw * 0.45;
  }

  _eu.set(0, ps.angle, 0);
  _cOff.set(0, 5, 10).applyEuler(_eu);
  _cTgt.copy(ps.pos).add(_cOff);
  camera.position.lerp(_cTgt, 0.1);
  camera.lookAt(ps.pos.x, ps.pos.y + 1.5, ps.pos.z);

  // ────────────────────────────────────────────────────────
  //  SWORD — ground spin + pickup detection
  // ────────────────────────────────────────────────────────
  if (!sword.pickedUp) {
    groundSword.rotation.y = groundSwordSpinTime * 1.2;
    groundSword.position.y = SWORD_POS.y + Math.sin(groundSwordSpinTime * 2) * 0.12;

    const dx = ps.pos.x - SWORD_POS.x, dz = ps.pos.z - SWORD_POS.z;
    const distToSword = Math.sqrt(dx*dx + dz*dz);
    pickupHintEl.style.display = distToSword < 6 ? 'block' : 'none';

    if (distToSword < 2.5) {
      sword.pickedUp = true;
      scene.remove(groundSword);
      handSword.visible = true;
      swordHudEl.style.display = 'block';
      pickupHintEl.style.display = 'none';
    }
  }

  // ────────────────────────────────────────────────────────
  //  SWORD SWING ANIMATION
  // ────────────────────────────────────────────────────────
  if (swing.active) {
    swing.timer += dt;
    const t = swing.timer / swing.duration;

    let armAngle;
    if      (t < 0.25) armAngle = -0.6 * (t / 0.25);
    else if (t < 0.75) armAngle = -0.6 + 2.4 * ((t - 0.25) / 0.5);
    else               armAngle = 1.8 * (1 - (t - 0.75) / 0.25);
    armRP.rotation.x = armAngle;
    armLP.rotation.x = sw * 0.3;

    if (!swing.hitRegistered && t > 0.25 && t < 0.78 && dragon.alive) {
      const distToDragon = ps.pos.distanceTo(dragon.pos);
      if (distToDragon < 8) {
        _gFwd.set(-Math.sin(ps.angle), 0, -Math.cos(ps.angle));
        _toDragon.subVectors(dragon.pos, ps.pos); _toDragon.y = 0; _toDragon.normalize();
        if (_toDragon.dot(_gFwd) > 0.35) {
          hitDragon();
          swing.hitRegistered = true;
        }
      }
    }

    if (swing.timer >= swing.duration) {
      swing.active = false; swing.cooldown = 0.22; armRP.rotation.x = 0;
    }
  }
  if (swing.cooldown > 0) swing.cooldown -= dt;

  // ────────────────────────────────────────────────────────
  //  SHADOW WISPS — float animation
  // ────────────────────────────────────────────────────────
  const t = now * 0.001;
  wisps.forEach(w => {
    w.mesh.position.y = w.baseY + Math.sin(t * w.speed + w.phase) * 0.8;
    w.mesh.position.x += w.driftX * dt;
    w.mesh.position.z += w.driftZ * dt;
    w.mesh.rotation.y += dt * 0.5;
    w.mesh.material.opacity = 0.35 + Math.sin(t * 2 + w.phase) * 0.25;
  });

  // ────────────────────────────────────────────────────────
  //  BATS — circle and flap
  // ────────────────────────────────────────────────────────
  bats.forEach(b => {
    b.angle += b.speed * 0.03 * dt;
    b.pos.x = b.centerX + Math.cos(b.angle) * b.circleRadius;
    b.pos.z = b.centerZ + Math.sin(b.angle) * b.circleRadius;
    b.pos.y += Math.sin(t * 3 + b.flapPhase) * 0.02;
    b.mesh.position.copy(b.pos);
    b.mesh.rotation.y = b.angle + Math.PI / 2;
    // Wing flap
    const flapAngle = Math.sin(t * 12 + b.flapPhase) * 0.6;
    b.wingL.rotation.z = flapAngle;
    b.wingR.rotation.z = -flapAngle;
  });

  // ────────────────────────────────────────────────────────
  //  CRYSTAL PULSE
  // ────────────────────────────────────────────────────────
  crystals.forEach((c, i) => {
    c.material.emissiveIntensity = 0.4 + Math.sin(t * 1.5 + i * 0.7) * 0.3;
  });

  // ────────────────────────────────────────────────────────
  //  PURPLE LIGHT PULSE
  // ────────────────────────────────────────────────────────
  purpleLight1.intensity = 1.2 + Math.sin(t * 1.2) * 0.4;
  purpleLight2.intensity = 1.0 + Math.sin(t * 0.9 + 1) * 0.3;

  // ────────────────────────────────────────────────────────
  //  VEXMOR — AI & animation
  // ────────────────────────────────────────────────────────
  if (dragon.alive && !dragon.exploding) {
    // Hover (more erratic than Ignaroth)
    dragon.pos.y = DRAG_BASE_Y + Math.sin(t * 2.2) * 0.7 + Math.sin(t * 4.1) * 0.2;
    dragon.mesh.position.y = dragon.pos.y;

    // Wing flap (faster, more aggressive)
    const flap = Math.sin(t * 4.5) * 0.5;
    dragon.wingLP.rotation.z =  flap;
    dragon.wingRP.rotation.z = -flap;

    // Shadow aura pulse
    dragon.aura.material.opacity = 0.1 + Math.sin(t * 2) * 0.08;
    dragon.aura.scale.setScalar(1 + Math.sin(t * 1.5) * 0.05);

    // Face George
    const dxd = ps.pos.x - dragon.pos.x, dzd = ps.pos.z - dragon.pos.z;
    const distPlayer = Math.sqrt(dxd*dxd + dzd*dzd);
    if (distPlayer < 60) {
      const wantAngle = Math.atan2(dxd, dzd);
      let diff = wantAngle - dragon.angle;
      while (diff >  Math.PI) diff -= 2*Math.PI;
      while (diff < -Math.PI) diff += 2*Math.PI;
      dragon.angle += diff * Math.min(dt * 2.0, 1);
    }
    dragon.mesh.rotation.y = dragon.angle;

    // ── ATTACK: Shadow Bolt ──
    if (distPlayer < 45 && ps.alive) {
      dragon.attackTimer -= dt;
      if (dragon.attackTimer <= 0) {
        spawnShadowBolt();
        // Fire rate increases as HP drops
        const hpRatio = dragon.hp / dragon.maxHp;
        dragon.attackTimer = dragon.attackCooldown * (0.5 + hpRatio * 0.5);
      }
    }

    // ── TELEPORT (when below 50% HP) ──
    if (dragon.hp <= dragon.maxHp / 2) {
      dragon.teleportTimer -= dt;
      if (dragon.teleportTimer <= 0 && !dragon.teleporting) {
        dragon.teleporting = true;
        dragon.teleportPhase = 0;
      }
    }

    if (dragon.teleporting) {
      dragon.teleportPhase += dt;
      if (dragon.teleportPhase < 0.5) {
        // Fade out
        dragon.mesh.traverse(child => {
          if (child.material) {
            child.material.transparent = true;
            child.material.opacity = 1 - dragon.teleportPhase * 2;
          }
        });
      } else if (dragon.teleportPhase < 0.6) {
        // Move to new position
        const newX = (Math.random() - 0.5) * 60;
        const newZ = (Math.random() - 0.5) * 60;
        dragon.pos.x = newX;
        dragon.pos.z = newZ;
        dragon.mesh.position.x = newX;
        dragon.mesh.position.z = newZ;
        DRAG_BASE_Y_CURRENT = getTerrainHeight(newX, newZ) + 5;
      } else if (dragon.teleportPhase < 1.1) {
        // Fade in
        const fadeIn = (dragon.teleportPhase - 0.6) * 2;
        dragon.mesh.traverse(child => {
          if (child.material) {
            child.material.opacity = Math.min(fadeIn, child === dragon.aura ? 0.15 : 1);
          }
        });
      } else {
        // Done
        dragon.teleporting = false;
        dragon.teleportTimer = 5 + Math.random() * 4;
        dragon.mesh.traverse(child => {
          if (child.material && child !== dragon.aura) {
            child.material.opacity = 1;
            child.material.transparent = false;
          }
        });
      }
    }

    // Contact damage
    if (distPlayer < 4 && ps.alive) {
      damagePlayer();
    }

    // Hit flash tint
    if (dragon.hitFlash > 0) {
      dragon.hitFlash -= dt;
      const f = Math.max(0, dragon.hitFlash) / 0.25;
      dragonParts.eyeMatL.emissiveIntensity = 1.2 + f * 3;
      dragonParts.eyeMatR.emissiveIntensity = 1.2 + f * 3;
    }
  }

  // Mutable base Y for teleporting
  if (dragon.alive && !dragon.teleporting) {
    dragon.pos.y = (typeof DRAG_BASE_Y_CURRENT !== 'undefined' ? DRAG_BASE_Y_CURRENT : DRAG_BASE_Y)
                   + Math.sin(t * 2.2) * 0.7 + Math.sin(t * 4.1) * 0.2;
    dragon.mesh.position.y = dragon.pos.y;
    dragon.mesh.position.x = dragon.pos.x;
    dragon.mesh.position.z = dragon.pos.z;
  }

  // ────────────────────────────────────────────────────────
  //  SHADOW BOLTS — update
  // ────────────────────────────────────────────────────────
  for (let i = dragon.shadowBolts.length - 1; i >= 0; i--) {
    const b = dragon.shadowBolts[i];
    b.age += dt;
    b.mesh.position.x += b.vel.x * dt;
    b.mesh.position.y += b.vel.y * dt;
    b.mesh.position.z += b.vel.z * dt;
    b.mesh.rotation.x += dt * 5;
    b.mesh.rotation.y += dt * 3;

    // Pulse effect
    const scale = 1 + Math.sin(b.age * 10) * 0.2;
    b.mesh.scale.setScalar(scale);

    // Hit player
    const distToPlayer = b.mesh.position.distanceTo(ps.pos);
    if (distToPlayer < 1.5 && ps.alive) {
      damagePlayer();
      scene.remove(b.mesh);
      dragon.shadowBolts.splice(i, 1);
      continue;
    }

    // Remove if too old or too far
    if (b.age > 4) {
      scene.remove(b.mesh);
      dragon.shadowBolts.splice(i, 1);
    }
  }

  // ────────────────────────────────────────────────────────
  //  EXPLOSION PARTICLES
  // ────────────────────────────────────────────────────────
  if (dragon.exploding) {
    dragon.explodeAge += dt;
    dragon.explodeParticles.forEach(p => {
      p.age += dt;
      p.vel.y -= 18 * dt;
      p.mesh.position.x += p.vel.x * dt;
      p.mesh.position.y += p.vel.y * dt;
      p.mesh.position.z += p.vel.z * dt;
      p.mesh.rotation.x += dt * 3;
      p.mesh.rotation.z += dt * 2;
      p.mesh.material.opacity = 1 - p.age / 2.0;
      p.mesh.material.transparent = true;
    });
    if (dragon.explodeAge > 2.5) {
      dragon.explodeParticles.forEach(p => scene.remove(p.mesh));
      dragon.explodeParticles = [];
      dragon.exploding = false;
    }
  }

  renderer.render(scene, camera);
}

let DRAG_BASE_Y_CURRENT = DRAG_BASE_Y;

// ═══════════════════════════════════════════════════════════
//  HIT DRAGON
// ═══════════════════════════════════════════════════════════
function hitDragon() {
  dragon.hp--;
  dragon.hitFlash = 0.25;
  flashHitOverlay();
  updateHpBar();

  if (dragon.hp <= 0) {
    dragon.alive = false;
    dragon.mesh.visible = false;
    dragon.exploding = true;
    spawnExplosion();
    victoryMsgEl.style.display = 'block';
    document.getElementById('dragon-hud').style.display = 'none';
    // Remove remaining shadow bolts
    dragon.shadowBolts.forEach(b => scene.remove(b.mesh));
    dragon.shadowBolts = [];
  }
}

animate();
</script>
